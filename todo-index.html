<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1><i class="fas fa-tasks"></i> My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <select id="categorySelect" class="category-select">
                        <option value="general">General</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                    </select>
                    <button id="addBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- Filter & Sort Section -->
            <div class="control-section">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-circle"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
                <div class="action-group">
                    <button id="clearBtn" class="clear-btn" title="Clear all completed tasks">
                        <i class="fas fa-trash"></i> Clear Completed
                    </button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <span class="stat-label">Total Tasks</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Remaining</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Progress</span>
                    <span class="stat-value" id="progress">0%</span>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="tasks-container">
                <div id="todoList" class="todo-list">
                    <!-- Tasks will be added here dynamically -->
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
